<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ma actor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-ornament"></div>

  <main class="shell">
    <header class="brand-row">
      <h1>ma actor</h1>
      <p>portable encrypted identity over IPFS and IPNS</p>
    </header>

    <section id="setup-view" class="card">
      <h2>Create or provide identity</h2>
      <p class="lead">Start with a username alias and passphrase. The alias is used as your Kubo key name.</p>

      <div class="grid-2">
        <div>
          <label for="kubo-api">Kubo API</label>
          <input id="kubo-api" type="text" value="http://127.0.0.1:5001" autocomplete="off">
        </div>
        <div>
          <label for="alias-name">Username Alias</label>
          <input id="alias-name" type="text" placeholder="for example: bahner" autocomplete="off">
        </div>
      </div>

      <div class="grid-2">
        <div>
          <label for="passphrase">Passphrase</label>
          <input id="passphrase" type="password" placeholder="minimum 8 characters" autocomplete="off">
        </div>
        <div>
          <label for="recovery-phrase">Recovery Words (BIP39)</label>
          <div class="row-tight">
            <input id="recovery-phrase" type="text" placeholder="twelve words" autocomplete="off">
            <button id="btn-new-phrase" type="button">New</button>
          </div>
        </div>
      </div>

      <label for="bundle-text">Encrypted Bundle (for recovery on this device)</label>
      <textarea id="bundle-text" placeholder="Paste a saved encrypted bundle to unlock, or leave empty when creating."></textarea>

      <div class="setup-actions">
        <button id="btn-kubo-check" type="button">Check Kubo</button>
        <button id="btn-create" class="primary" type="button">Create Identity</button>
        <button id="btn-unlock" type="button">Unlock Provided Bundle</button>
      </div>

      <p id="kubo-status" class="status idle">kubo not checked</p>
      <p id="setup-status" class="setup-status"></p>
    </section>

    <section id="chat-view" class="chat hidden" aria-live="polite">
      <div class="chat-top">
        <div>
          <h2>Ready to explore</h2>
          <p class="lead" id="identity-line"></p>
        </div>
        <div class="chat-tools">
          <button id="btn-export" type="button">Export Bundle</button>
          <button id="btn-lock" type="button">Lock</button>
        </div>
      </div>

      <div id="transcript" class="transcript"></div>

      <form id="command-form" class="composer">
        <input id="command-input" type="text" placeholder="Type a command, for example /identity or /publish" autocomplete="off">
        <button type="submit" class="primary">Send</button>
      </form>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
